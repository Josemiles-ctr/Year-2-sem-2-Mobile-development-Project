name: Security

on:
  push:
    branches:
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - dev
  schedule:
    # Run every Monday at 03:00 UTC to catch newly-published CVEs
    # even when no code has changed.
    - cron: '0 3 * * 1'

jobs:

  # ── 1. Secret Scanning (Gitleaks) ──────────────────────────────────────────
  # Scans the full git history for accidentally committed secrets:
  # API keys, tokens, passwords, private keys, etc.
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Dependency Review (PRs only) ─────────────────────────────────────────
  # Compares dependency changes introduced by the PR against the GitHub
  # Advisory Database and blocks merges if new vulnerable deps are added.
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high
