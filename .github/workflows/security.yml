name: Security

on:
  push:
    branches:
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - dev
  schedule:
    # Run every Monday at 03:00 UTC to catch newly-published CVEs
    # even when no code has changed.
    - cron: '0 3 * * 1'

jobs:

  # ── 1. Secret Scanning (Gitleaks) ──────────────────────────────────────────
  # Scans the full git history for accidentally committed secrets:
  # API keys, tokens, passwords, private keys, etc.
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@44c5b0b1f365650eb58e7ffad91bdff3dcd2fe4b  # v4.1.1
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Dependency Review (PRs only) ─────────────────────────────────────────
  # Compares dependency changes introduced by the PR against the GitHub
  # Advisory Database and blocks merges if new vulnerable deps are added.
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@44c5b0b1f365650eb58e7ffad91bdff3dcd2fe4b  # v4.1.1

      - name: Dependency Review
        uses: actions/dependency-review-action@c9f02be6c1c2c9e4fa31f0da8e5a2b8dd5dd8e94  # v4.0.0
        with:
          fail-on-severity: high

  # ── 3. OWASP Dependency-Check ────────────────────────────────────────────────
  # Deep CVE scan of all resolved Gradle dependencies against the NVD database.
  # Fails the build if any dependency has a CVSS score ≥ 7 (HIGH or CRITICAL).
  #
  # Required secret: NVD_API_KEY
  #   → Get a free key at https://nvd.nist.gov/developers/request-an-api-key
  #   → Add it in: GitHub repo → Settings → Secrets → Actions → New secret
  owasp-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read  
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@44c5b0b1f365650eb58e7ffad91bdff3dcd2fe4b  # v4.1.1

      - name: Set up JDK 21
        uses: actions/setup-java@9da3f4460191a3612b36b334b6371f0f7457cb69  # v4.0.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # Capture today's date so the NVD cache rotates daily (fresh CVE data)
      - name: Get current date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # Cache the NVD database to avoid re-downloading on every run (~200 MB)
      - name: Cache NVD database
        uses: actions/cache@13aacd865c20de90d75de3b17ebe84f69a6cf420  # v4.0.0
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run OWASP Dependency Check
        run: ./gradlew :app:dependencyCheckAnalyze --no-daemon
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload HTML report
        if: always()   # upload even if the scan found vulnerabilities
        uses: actions/upload-artifact@26f896d76c12c087176ad0fa6ea33ce646f1c39e  # v4.0.0
        with:
          name: owasp-report
          path: app/build/reports/dependency-check-report.html
          retention-days: 30

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        # Pinned to specific commit SHA for reproducibility and security
        # v4.8.0: uses: github/codeql-action/upload-sarif@e5f505b9ef71eb729cfb242af826dbb3efb81a76
        uses: github/codeql-action/upload-sarif@e5f505b9ef71eb729cfb242af826dbb3efb81a76
        with:
          sarif_file: app/build/reports/dependency-check-report.sarif
