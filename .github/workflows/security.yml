name: Security

on:
  push:
    branches:
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - dev
  schedule:
    # Run every Monday at 03:00 UTC to catch newly-published CVEs
    # even when no code has changed.
    - cron: '0 3 * * 1'

jobs:

  # ── 1. Secret Scanning (Gitleaks) ──────────────────────────────────────────
  # Scans the full git history for accidentally committed secrets:
  # API keys, tokens, passwords, private keys, etc.
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Dependency Review (PRs only) ─────────────────────────────────────────
  # Compares dependency changes introduced by the PR against the GitHub
  # Advisory Database and blocks merges if new vulnerable deps are added.
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high

  # ── 3. OWASP Dependency-Check ────────────────────────────────────────────────
  # Deep CVE scan of all resolved Gradle dependencies against the NVD database.
  # Fails the build if any dependency has a CVSS score ≥ 7 (HIGH or CRITICAL).
  #
  # Required secret: NVD_API_KEY
  #   → Get a free key at https://nvd.nist.gov/developers/request-an-api-key
  #   → Add it in: GitHub repo → Settings → Secrets → Actions → New secret
  owasp-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read  
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # Capture today's date so the NVD cache rotates daily (fresh CVE data)
      - name: Get current date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # Cache the NVD database to avoid re-downloading on every run (~200 MB)
      - name: Cache NVD database
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run OWASP Dependency Check
        run: ./gradlew :app:dependencyCheckAnalyze --no-daemon
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload HTML report
        if: always()   # upload even if the scan found vulnerabilities
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: owasp-report
          path: app/build/reports/dependency-check-report.html
          retention-days: 30

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc  # v4.34.1
        with:
          sarif_file: app/build/reports/dependency-check-report.sarif
